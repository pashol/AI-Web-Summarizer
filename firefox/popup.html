<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Web Summarizer</title>
  <style>
    :root {
      --color-bg: #ffffff;
      --color-surface: #f5f5f5;
      --color-text: #333333;
      --color-text-muted: #555555;
      --color-border: #dddddd;
      --color-primary: #0066cc;
      --color-primary-hover: #0052a3;
      --color-success: #28a745;
      --color-success-hover: #218838;
      --color-chat-bg: #f0f8ff;
      --color-warning-bg: #fff3cd;
      --color-warning-border: #ffc107;
      --color-warning-text: #856404;
      --color-error-bg: #fff3f3;
      --color-error-border: #ffcccc;
      --color-error: #c00;
      --color-disabled: #6c757d;
      --color-disabled-hover: #5a6268;
      --radius: 6px;
    }

    [data-theme="dark"] {
      --color-bg: #1a1a2e;
      --color-surface: #16213e;
      --color-text: #e0e0e0;
      --color-text-muted: #a0a0a0;
      --color-border: #2d3a4f;
      --color-primary: #4da6ff;
      --color-primary-hover: #3399ff;
      --color-success: #3dd68c;
      --color-success-hover: #2eb872;
      --color-chat-bg: #1e3a5f;
      --color-warning-bg: #3d3520;
      --color-warning-border: #8b6914;
      --color-warning-text: #e0c060;
      --color-error-bg: #2d1f1f;
      --color-error-border: #5c2828;
      --color-error: #ff6b6b;
      --color-disabled: #4a5568;
      --color-disabled-hover: #5a6268;
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --color-bg: #1a1a2e;
        --color-surface: #16213e;
        --color-text: #e0e0e0;
        --color-text-muted: #a0a0a0;
        --color-border: #2d3a4f;
        --color-primary: #4da6ff;
        --color-primary-hover: #3399ff;
        --color-success: #3dd68c;
        --color-success-hover: #2eb872;
        --color-chat-bg: #1e3a5f;
        --color-warning-bg: #3d3520;
        --color-warning-border: #8b6914;
        --color-warning-text: #e0c060;
        --color-error-bg: #2d1f1f;
        --color-error-border: #5c2828;
        --color-error: #ff6b6b;
        --color-disabled: #4a5568;
        --color-disabled-hover: #5a6268;
      }
    }

    body { width: 500px; padding: 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; background: var(--color-bg); color: var(--color-text); }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    h2 { margin: 0; font-size: 18px; color: var(--color-text); }
    .header-buttons { display: flex; gap: 8px; }
    #toggleSettingsBtn, #toggleChatBtn { padding: 6px 12px; background: var(--color-disabled); color: white; border: none; border-radius: 4px; font-size: 12px; cursor: pointer; width: auto; margin: 0; }
    #toggleSettingsBtn:hover, #toggleChatBtn:hover { background: var(--color-disabled-hover); }
    .settings { margin-bottom: 16px; padding: 12px; background: var(--color-surface); border-radius: 6px; }
    .settings.hidden { display: none; }
    .chat-panel { margin-bottom: 16px; padding: 12px; background: var(--color-chat-bg); border-radius: 6px; }
    .chat-panel.hidden { display: none; }
    label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 500; color: var(--color-text-muted); }
    select, input { width: 100%; padding: 8px; border: 1px solid var(--color-border); border-radius: 4px; font-size: 13px; box-sizing: border-box; margin-bottom: 12px; background: var(--color-bg); color: var(--color-text); }
    textarea { width: 100%; padding: 8px; border: 1px solid var(--color-border); border-radius: 4px; font-size: 13px; box-sizing: border-box; margin-bottom: 12px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; resize: vertical; background: var(--color-bg); color: var(--color-text); }
    button { width: 100%; padding: 10px; background: var(--color-primary); color: white; border: none; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; margin-bottom: 8px; transition: background-color 150ms ease; display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
    button:hover { background: var(--color-primary-hover); }
    button:focus-visible { outline: 2px solid var(--color-primary); outline-offset: 2px; }
    button:disabled { background: var(--color-text-muted); cursor: not-allowed; }
    #speakBtn { background: var(--color-success); display: none; }
    #speakBtn:hover { background: var(--color-success-hover); }
    #speakBtn.speaking { background: var(--color-error); }
    #factCheckBtn { background: var(--color-primary); }
    #factCheckBtn:hover { background: var(--color-primary-hover); }
    #factCheckBtn.disabled-feature { background: var(--color-disabled); }
    .main-action-buttons { display: flex; gap: 8px; margin-bottom: 8px; }
    .main-action-buttons button { margin-bottom: 0; }
    .settings-actions { display: flex; gap: 8px; margin-bottom: 8px; }
    .settings-actions button { margin-bottom: 0; flex: 1; width: auto; }
    .settings-actions button.secondary { flex: 0 0 auto; padding: 10px 14px; width: auto; min-width: 0; }
    button.secondary { background: var(--color-error-bg); color: var(--color-error); border: 1px solid var(--color-error-border); }
    button.secondary:hover { background: var(--color-error-border); color: var(--color-error); }
    .summary { margin-top: 16px; padding: 12px; background: var(--color-surface); border-radius: 6px; border: 1px solid var(--color-border); max-height: 400px; overflow-y: auto; font-size: 13px; line-height: 1.6; color: var(--color-text); white-space: pre-wrap; }
    .error { background: var(--color-error-bg); border-color: var(--color-error-border); color: var(--color-error); }
    .loading { text-align: center; color: var(--color-text-muted); font-style: italic; }
    .hidden { display: none; }
    .info { font-size: 11px; color: var(--color-text-muted); margin-top: 4px; }
    .warning-banner {
      background: var(--color-warning-bg);
      border: 1px solid var(--color-warning-border);
      color: var(--color-warning-text);
      padding: 10px 12px;
      border-radius: 4px;
      margin-bottom: 12px;
      font-size: 13px;
      display: none;
      align-items: center;
      gap: 8px;
    }
    .warning-banner.show { display: flex; }
    .warning-banner .icon { flex-shrink: 0; }
    .header h2 { display: flex; align-items: center; gap: 8px; }
    button.disabled-feature {
      opacity: 0.5;
      cursor: not-allowed;
      background: var(--color-disabled);
    }
    button.disabled-feature:hover { background: var(--color-disabled); }
    #version-footer { text-align: center; color: var(--color-text-muted); font-size: 11px; margin-top: 8px; }
    #version-footer a { color: var(--color-text-muted); text-decoration: none; transition: color 150ms ease; }
    #version-footer a:hover { color: var(--color-primary); }
  </style>
</head>
<body>
  <div class="warning-banner" id="apiKeyWarning">
    <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
    <span><strong>API Key Required</strong> — <span class="settings-link" id="openFullSettingsLink">Open Full Settings</span> to configure your API key</span>
  </div>
  
  <div class="header">
    <h2>
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2M7.5 13A2.5 2.5 0 0 0 5 15.5A2.5 2.5 0 0 0 7.5 18a2.5 2.5 0 0 0 2.5-2.5A2.5 2.5 0 0 0 7.5 13m9 0a2.5 2.5 0 0 0-2.5 2.5a2.5 2.5 0 0 0 2.5 2.5a2.5 2.5 0 0 0 2.5-2.5a2.5 2.5 0 0 0-2.5-2.5z"></path></svg>
      AI Web Summarizer
    </h2>
    <div class="header-buttons">
      <button id="toggleChatBtn" aria-label="Toggle chat">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
        Chat
      </button>
      <button id="toggleSettingsBtn" aria-label="Toggle settings">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        Settings
      </button>
    </div>
  </div>
  
  <div class="settings hidden" id="settingsPanel">
    <label>AI Provider:</label>
    <select id="provider">
      <option value="openrouter">OpenRouter</option>
      <option value="openai">ChatGPT (OpenAI Native)</option>
    </select>

    <label>Model:</label>
    <select id="model"></select>

    <label>Summary Language:</label>
    <select id="language">
      <option value="english">English</option>
      <option value="spanish">Spanish (Español)</option>
      <option value="french">French (Français)</option>
      <option value="german">German (Deutsch)</option>
      <option value="italian">Italian (Italiano)</option>
      <option value="portuguese">Portuguese (Português)</option>
      <option value="russian">Russian (Русский)</option>
      <option value="chinese">Chinese (中文)</option>
      <option value="japanese">Japanese (日本語)</option>
      <option value="korean">Korean (한국어)</option>
      <option value="arabic">Arabic (العربية)</option>
      <option value="hindi">Hindi (हिन्दी)</option>
      <option value="dutch">Dutch (Nederlands)</option>
      <option value="polish">Polish (Polski)</option>
      <option value="turkish">Turkish (Türkçe)</option>
    </select>

    <div class="settings-actions">
      <button id="saveSettingsBtn">Save Settings</button>
      <button id="fullSettingsBtn" class="secondary" aria-label="Full settings">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      </button>
    </div>
    <div id="version-footer">
      v<span id="ext-version"></span> &mdash; by <a href="https://github.com/pashol" target="_blank">pashol</a>
      &bull; <a href="https://github.com/pashol/AI-Web-Summarizer" target="_blank">GitHub</a>
      &bull; <a href="https://ko-fi.com/gggentii" target="_blank">Donate</a>
    </div>
  </div>

  <div class="chat-panel hidden" id="chatPanel">
    <label>Ask AI Anything:</label>
    <textarea id="customPrompt" placeholder="Enter your question or prompt here..." rows="4"></textarea>
    <button id="sendPromptBtn">Send</button>
  </div>

  <div class="main-action-buttons">
    <button id="summarizeBtn" title="Select text to summarize only that portion&#10;Shortcut: Ctrl+Alt+S">Summarize This Page</button>
    <button id="factCheckBtn" title="Verify claims on this page&#10;Shortcut: Ctrl+Alt+F">Fact Check This Page</button>
  </div>
  <button id="speakBtn">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
    Read Aloud
  </button>
  <div id="result" class="summary hidden"></div>

  <script src="popup.js"></script>
</body>
</html>
