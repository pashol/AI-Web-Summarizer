<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Summary Result</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
      height: 100%;
      box-sizing: border-box;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      min-height: calc(100vh - 40px);
      box-sizing: border-box;
    }
    h1 {
      margin: 0 0 10px 0;
      font-size: 24px;
      color: #333;
    }
    .page-info {
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 2px solid #e0e0e0;
      flex-shrink: 0;
    }
    .url {
      color: #0066cc;
      font-size: 14px;
      word-break: break-all;
      margin-top: 5px;
    }
    .url a {
      color: #0066cc;
      text-decoration: none;
    }
    .url a:hover {
      text-decoration: underline;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
      font-style: italic;
    }
    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #0066cc;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .summary {
      font-size: 15px;
      line-height: 1.7;
      color: #333;
      white-space: pre-wrap;
      flex: 1 0 auto;
      overflow-y: auto;
      min-height: 100px;
    }
    .error {
      background: #fff3f3;
      border: 1px solid #ffcccc;
      color: #c00;
      padding: 15px;
      border-radius: 6px;
      margin-top: 20px;
    }
    .actions {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    button {
      padding: 10px 20px;
      background: #0066cc;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 500;
    }
    button:hover {
      background: #0052a3;
    }
    #speakBtn {
      background: #28a745;
    }
    #speakBtn:hover {
      background: #218838;
    }
    #speakBtn.speaking {
      background: #dc3545;
    }
    .copied-notification {
      display: none;
      position: fixed;
      top: 20px;
      right: 20px;
      background: #28a745;
      color: white;
      padding: 12px 20px;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      z-index: 1000;
    }
    .copied-notification.show {
      display: block;
      animation: slideIn 0.3s ease-out;
    }
    @keyframes slideIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    /* Follow-up chat section */
    .chat-section {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 2px solid #e0e0e0;
      display: none;
      flex-shrink: 0;
    }
    .chat-section h2 {
      font-size: 16px;
      color: #555;
      margin: 0 0 14px 0;
      font-weight: 600;
    }
    .chat-history {
      max-height: 400px;
      overflow-y: auto;
      margin-bottom: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .chat-message {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .chat-message.user {
      background: #e8f0fe;
      color: #1a1a1a;
      align-self: flex-end;
      max-width: 85%;
      border-bottom-right-radius: 2px;
    }
    .chat-message.assistant {
      background: #f1f3f4;
      color: #333;
      align-self: flex-start;
      max-width: 85%;
      border-bottom-left-radius: 2px;
    }
    .chat-message .msg-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
      opacity: 0.55;
    }
    .chat-input-area {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .chat-input-area textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
      min-height: 66px;
      box-sizing: border-box;
      color: #333;
    }
    .chat-input-area textarea:focus {
      outline: none;
      border-color: #0066cc;
      box-shadow: 0 0 0 2px rgba(0,102,204,0.15);
    }
    #askBtn {
      align-self: flex-end;
      padding: 9px 22px;
      font-size: 14px;
      min-width: 70px;
    }
    #askBtn:disabled {
      background: #aaa;
      cursor: not-allowed;
    }
    .chat-thinking {
      font-size: 13px;
      color: #888;
      font-style: italic;
      display: none;
      padding: 2px 0 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="page-info" id="pageInfo">
      <h1 id="pageTitle">Loading...</h1>
      <div class="url" id="pageUrl"></div>
    </div>
    
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Generating AI summary...</p>
    </div>
    
    <div class="summary" id="summary" style="display: none;"></div>
    <div class="error" id="error" style="display: none;"></div>
    
    <div class="actions" id="actions" style="display: none;">
      <button id="speakBtn">🔊 Read Aloud</button>
      <button id="copyBtn">📋 Copy Summary</button>
      <button id="followUpToggleBtn">💬 Follow Up</button>
    </div>

    <div class="chat-section" id="chatSection">
      <h2>Ask a follow-up question</h2>
      <div class="chat-history" id="chatHistory"></div>
      <div class="chat-thinking" id="chatThinking">Thinking...</div>
      <div class="chat-input-area">
        <textarea id="followUpInput" placeholder="Ask anything about this article... (Ctrl+Enter to send)" rows="3"></textarea>
        <button id="askBtn">Ask</button>
      </div>
    </div>
  </div>

  <div class="copied-notification" id="copiedNotification">
    ✓ Copied to clipboard!
  </div>

  <script src="result.js"></script>
</body>
</html>
